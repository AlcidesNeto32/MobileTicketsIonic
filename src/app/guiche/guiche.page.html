<ion-header>
  <ion-toolbar color="secondary">
    <ion-title>Controle do Guichê</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center">
  <div class="guiche-container">
    <ion-item>
      <ion-label>Meu Guichê:</ion-label>
      <ion-select [(ngModel)]="meuGuiche" interface="popover">
        <ion-select-option [value]="1">Guichê 01</ion-select-option>
        <ion-select-option [value]="2">Guichê 02</ion-select-option>
        <ion-select-option [value]="3">Guichê 03</ion-select-option>
      </ion-select>
    </ion-item>

    <div class="atendimento-atual" *ngIf="senhaEmAtendimento">
      <h3>Atendendo Agora:</h3>
      <div class="senha-destaque">{{ senhaEmAtendimento.numero }}</div>
      
      <ion-grid>
        <ion-row>
          <ion-col>
            <ion-button expand="block" color="success" (click)="finalizarAtendimento()">
              Finalizar
            </ion-button>
          </ion-col>
          <ion-col>
            <ion-button expand="block" color="warning" (click)="registrarAusencia()">
              Não Compareceu
            </ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>

    <div class="espera" *ngIf="!senhaEmAtendimento">
      <p>Nenhum cliente em atendimento no momento.</p>
      <ion-button expand="block" size="large" (click)="chamarProximo()">
        Chamar Próximo
      </ion-button>
    </div>
  </div>
</ion-content>
