<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Retire sua Senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center">
  <div class="totem-container">
    <h2>Selecione o tipo de atendimento:</h2>

    <ion-button expand="block" class="btn-totem btn-sp" (click)="emitir('SP')">
      <ion-icon name="alert-circle-outline" slot="start"></ion-icon>
      Prioritário (SP)
    </ion-button>

    <ion-button expand="block" class="btn-totem btn-se" (click)="emitir('SE')">
      <ion-icon name="medkit-outline" slot="start"></ion-icon>
      Exames (SE)
    </ion-button>

    <ion-button expand="block" class="btn-totem btn-sg" (click)="emitir('SG')">
      <ion-icon name="people-outline" slot="start"></ion-icon>
      Geral (SG)
    </ion-button>

    <ion-card *ngIf="ultimaSenhaEmitida" class="ticket-card">
      <ion-card-header>
        <ion-card-subtitle>Sua Senha</ion-card-subtitle>
        <ion-card-title class="senha-texto">{{ ultimaSenhaEmitida.numero }}</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        Aguarde ser chamado no painel.<br>
        <small>Emitida em: {{ ultimaSenhaEmitida.horaEmissao | date:'HH:mm:ss' }}</small>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
